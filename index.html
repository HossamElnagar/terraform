<!DOCTYPE html>

<html lang="en">
 <head>
    <meta charset="UTF-8">
    <title >CRUDS</title>
    <link rel="stylesheet" href="style.css">

 </head>
 <body>
    <div class="crud">
        <div class="head">
            <h1 style="font-size: 45px;">CRUDS</h1>
            <p>PRODUCT MANAGMENT SYSTEM</p>
        </div>

        <div class="inputs">
            <input type="text" placeholder="title" id="title">
            <div class="price">
                <input onkeyup="getTotal()" type="number" id="price" placeholder="price">
                <input onkeyup="getTotal()" type="number" id="taxes" placeholder="taxes">
                <input onkeyup="getTotal()" type="number" id="ads" placeholder="ads">
                <input onkeyup="getTotal()" type="number" id="discount" placeholder="discount">
                <small id="total"></small>
            </div>    
            <input type="number" placeholder="count" id="count">
            <input type="text" placeholder="category" id="category">
            <button id="submit"><h1>Create</h1></button>
            

        </div>
        <div class="outputs">
            <div class="searchBlock">
                <input type="text" onkeyup="searchData(this.value)" placeholder="Search" id="search">
                <div class="btnSearch">
                    <button onclick="getSearchMood(this.id)" id="searchByTitle">Search By Title</button>
                    <button onclick="getSearchMood(this.id)" id="searchByCategory">Search By Category</button>
                </div>
                <div id="deleteAll">

                </div>
                <table>
                    <thead>    
                      <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>price</th>
                        <th>taxes</th>
                        <th>ads</th>
                        <th>total</th>
                        <th>category</th>
                        <th>update</th>
                        <th>delete</th>
                      </tr>
                    </thead>
                    <tbody id="tbody">
                        
                    </tbody>
                </table>
            </div>
        </div>
    </div>
      <script src="main.js"></script>

 </body>

</html>
